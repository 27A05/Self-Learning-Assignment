<!-- 4) accept student id and student name from user
   on Button click save data in Object format 
   and display data in Table format on same html page -->

<!DOCTYPE html>
<html>
    <head>
        <title>Student Data</title>
    </head>
    <body>
        <h2>Student Form</h2>

        Student Id:
        <input type="text" id="sid"><br><br>

        Student Name:
        <input type="text" id="sname"><br><br>

        <button onclick="addData()">Add Student</button>
        <br><br>

        <h2>Student Table</h2>

        <table border="1" id="studentTable">
            <tr>
                <th>Student Id</th>
                <th>Student Name</th>
            </tr>
        </table>

        <script>

            // let students = [];

            function addData()
            {
                var id = document.getElementById("sid").value;
                var name = document.getElementById("sname").value;

                var student = 
                {
                    id: id,
                    name: name
                };

                // students.push(student);

                var table = document.getElementById("studentTable");

                var row = table.insertRow(-1);

                var cell1 = row.insertCell(0);
                var cell2 = row.insertCell(1);

                cell1.innerHTML = student.id;
                cell2.innerHTML = student.name;

                // document.getElementById("sid").value = "";
                // document.getElementById("sname").value = "";
            }
        </script>
    </body>
</html>
